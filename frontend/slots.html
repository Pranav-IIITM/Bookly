<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse open booking slots and reserve your spot in seconds.">
  <title>Available Slots | Bookly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap">
  <link rel="icon" type="image/png" href="favicon.png?v=2">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Bookly</a>
    <nav class="nav-links" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="booking.html">Book</a>
      <a href="dashboard.html">Dashboard</a>
      <a id="nav-auth-btn" class="button button-small" href="auth.html">Sign In</a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="section-heading compact">
      <p class="eyebrow">Open calendar</p>
      <h1>Available slots</h1>
      <p>Choose a slot to continue to the booking form.</p>
    </section>

    <section class="toolbar">
      <button id="refresh-slots" class="button button-secondary" type="button">Refresh Slots</button>
      <p id="slots-status" class="status-message" role="status" aria-live="polite"></p>
    </section>

    <section id="slots-list" class="slot-grid" aria-live="polite"></section>
  </main>

  <script type="module" src="js/slots.js"></script>
  <script type="module" src="js/nav-auth.js"></script>
</body>
</html>
