<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your personal Bookly dashboard — view and manage all your reservations.">
  <title>Dashboard | Bookly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap">
  <link rel="icon" type="image/png" href="favicon.png?v=2">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Bookly</a>
    <nav class="nav-links" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="slots.html">Slots</a>
      <a href="booking.html">Book</a>
      <button id="logout-button" class="button button-small button-secondary" type="button">Logout</button>
    </nav>
  </header>

  <main class="page-shell">
    <!-- User profile section -->
    <section id="user-profile" class="user-profile" aria-label="User profile" hidden>
      <div class="profile-avatar" id="profile-avatar" aria-hidden="true"></div>
      <div class="profile-info">
        <p class="profile-name" id="profile-name"></p>
        <p class="profile-email" id="profile-email"></p>
      </div>
      <button id="profile-logout" class="button button-ghost button-small" type="button">Sign out</button>
    </section>

    <section class="section-heading compact">
      <p class="eyebrow">Your account</p>
      <h1>Bookings dashboard</h1>
      <p>Review all reservations tied to your logged-in user.</p>
    </section>

    <section class="toolbar">
      <button id="refresh-bookings" class="button button-secondary" type="button">Refresh Bookings</button>
      <p id="dashboard-status" class="status-message" role="status" aria-live="polite"></p>
    </section>

    <section id="bookings-list" class="booking-grid" aria-live="polite"></section>
  </main>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
